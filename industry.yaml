    icon: "dashboard"
    endpoint: "/api/analytics/dashboard"
    description: "KPI overview and real-time metrics"

  - label: "Incidents"
    icon: "warning"
    endpoint: "/api/incidents"
    description: "Active and historical incidents"

  - label: "Readings"
    icon: "sensors"
    endpoint: "/api/readings"
    description: "Telemetry and sensor data"

  - label: "Assets"
    icon: "inventory"
    endpoint: "/api/topology"
    description: "Asset inventory and topology"

  - label: "Forecasts"
    icon: "trending_up"
    endpoint: "/api/forecasts"
    description: "Predictive analytics"

  - label: "Work Orders"
    icon: "assignment"
    endpoint: "/api/work-orders"
    description: "Task and work order management"

  - label: "Dispatch"
    icon: "local_shipping"
    endpoint: "/api/dispatch"
    description: "Crew and resource scheduling"

  - label: "Notifications"
    icon: "notifications"
    endpoint: "/api/notifications"
    description: "Alert and notification history"

  - label: "Pricing"
    icon: "attach_money"
    endpoint: "/api/pricing"
    description: "Rates and pricing data"

  - label: "Correlation"
    icon: "hub"
    endpoint: "/api/correlation"
    description: "Event correlation analysis"

  - label: "External Data"
    icon: "cloud"
    endpoint: "/api/external"
    description: "Third-party data feeds"

  - label: "Aggregation"
    icon: "bar_chart"
    endpoint: "/api/aggregation"
    description: "Aggregated reports and summaries"

  - label: "Audit Log"
    icon: "history"
    endpoint: "/api/audit"
    description: "System audit trail"

  - label: "Users"
    icon: "people"
    endpoint: "/api/auth/users"
    description: "User management"

# --- KPIs ---------------------------------------------------
kpis:
  - name: "Active Incidents"
    source: "/api/analytics/dashboard"
    field: "active_incidents"
    format: "number"
    color: "#f44336"

  - name: "Readings/Hour"
    source: "/api/analytics/dashboard"
    field: "readings_per_hour"
    format: "number"
    color: "#2196f3"

  - name: "Asset Uptime"
    source: "/api/analytics/dashboard"
    field: "asset_uptime_pct"
    format: "percent"
    color: "#4caf50"

  - name: "Open Work Orders"
    source: "/api/analytics/dashboard"
    field: "open_work_orders"
    format: "number"
    color: "#ff9800"

  - name: "Forecast Accuracy"
    source: "/api/analytics/dashboard"
    field: "forecast_accuracy_pct"
    format: "percent"
    color: "#9c27b0"

  - name: "Avg Response Time"
    source: "/api/analytics/dashboard"
    field: "avg_response_minutes"
    format: "minutes"
    color: "#00bcd4"

# --- User Roles ---------------------------------------------
roles:
  - name: viewer
    description: "Read-only access to dashboards and data"
  - name: operator
    description: "Can create incidents and work orders"
  - name: manager
    description: "Full access including dispatch and pricing"
  - name: admin
    description: "System administration and user management"

# --- Regions ------------------------------------------------
regions:
  - { id: "region-1", name: "North" }
  - { id: "region-2", name: "South" }
  - { id: "region-3", name: "East" }
  - { id: "region-4", name: "West" }
  - { id: "region-5", name: "Central" }

# --- Fault Scenarios ----------------------------------------
# For resilience testing and chaos engineering demos.
fault_scenarios:
  - name: "Service Outage"
    description: "Kill a random backend service pod"
    target: "any-service"

  - name: "Database Latency"
    description: "Inject 500ms latency on TimescaleDB"
    target: "timescaledb"

  - name: "Kafka Partition Loss"
    description: "Simulate Kafka broker failure"
    target: "kafka"

  - name: "Cache Flush"
    description: "Clear all Redis keys"
    target: "redis"

  - name: "Network Split"
    description: "Block traffic between two services"
    target: "network"

