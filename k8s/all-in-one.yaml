# ============================================================
# Generic App - All-in-One Kubernetes Manifest
# ============================================================
# AGENT: After industry customization, replace all generic
# service names with industry-specific names from industry.yaml
# ============================================================
#
# Infrastructure (TimescaleDB, Redis, Kafka, RabbitMQ) is in
# infrastructure.yaml — deploy that first.
# ============================================================

# --- Shared environment ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  DB_HOST: "timescaledb"
  DB_PORT: "5432"
  DB_NAME: "appdb"
  DB_USER: "appuser"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BROKER: "kafka:9092"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  DB_PASSWORD: "<DB_PASSWORD>"
  RABBITMQ_PASSWORD: "<RABBITMQ_PASSWORD>"
  DEMO_PASSWORD: "<DEMO_PASSWORD>"

# ============================================================
# primary-service (Node.js - port 3001)
# AGENT: Rename to industry-specific name
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: primary-service
spec:
  ports:
    - port: 3001
  selector:
    app: primary-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: primary-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: primary-service
  template:
    metadata:
      labels:
        app: primary-service
    spec:
      containers:
        - name: primary-service
          image: <YOUR_REGISTRY>/primary-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }

