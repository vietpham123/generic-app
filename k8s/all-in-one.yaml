# ============================================================
# load-generator (Locust - port 8089)
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: load-generator
spec:
  ports:
    - port: 8089
  selector:
    app: load-generator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: <YOUR_REGISTRY>/load-generator:latest
          ports:
            - containerPort: 8089
          env:
            - name: LOCUST_HOST
              value: "http://api-gateway:3000"
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DEMO_PASSWORD
          command: ["locust", "-f", "locustfile.py", "--host", "http://api-gateway:3000", "--web-host", "0.0.0.0"]
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
